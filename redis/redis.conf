bind 0.0.0.0
port 6379
dir /data

# Durability: append every write to AOF and fsync every second.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no

# Snapshot backups for additional crash recovery coverage.
save 900 1
save 300 10
save 60 10000

# Avoid accidental eviction when used as a log buffer.
maxmemory-policy noeviction
